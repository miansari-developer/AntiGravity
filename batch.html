<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Compression - Photon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <div class="bg-pattern"></div>
  <div class="bg-orb left-orb"></div>
  <div class="bg-orb right-orb"></div>

  <main class="app-container glass-panel">
    <header class="app-header" style="position: relative;">
      <button id="theme-toggle" class="btn-icon" style="position: absolute; right: 0; top: 0; z-index: 10;"
        title="Toggle Theme">
        <svg id="theme-icon-light" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <h1 class="glow-text">Photon</h1>
      <p class="subtitle">100% Local • Zero-Upload Image Compression</p>

      <nav class="app-nav">
        <a href="index.html" class="nav-link">Single</a>
        <a href="batch.html" class="nav-link active">Batch Mode</a>
      </nav>
    </header>

    <section class="upload-section" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" multiple hidden />
      <div class="upload-content">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <p>Drag & Drop images or <span class="highlight">Browse</span></p>
        <p style="font-size: 0.9rem; margin-top: 12px; opacity: 0.6;">Upload multiple images to compress them at once
        </p>
      </div>
    </section>

    <section class="workspace hidden" id="workspace">
      <div class="controls-panel glass-card">
        <h3>Batch Settings</h3>

        <div class="control-group">
          <div class="control-header">
            <label for="quality-slider">Quality (<span id="quality-val">80</span>%)</label>
          </div>
          <input type="range" id="quality-slider" min="1" max="100" value="80" class="neon-slider">
        </div>

        <div class="control-group">
          <div class="control-header">
            <label for="target-size">Target Size (KB)</label>
          </div>
          <input type="number" id="target-size" placeholder="Optional (e.g. 500)" class="neon-input">
          <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">If set, quality will be adjusted to
            fit this size.</p>
        </div>

        <div class="control-group">
          <div class="control-header"
            style="align-items: center; display: flex; justify-content: space-between; margin-bottom: 12px;">
            <label style="margin: 0;">Max Dimensions</label>
            <select id="dimension-unit" class="neon-select" style="width: 100px; padding: 4px 8px;">
              <option value="px">px</option>
              <option value="%">%</option>
              <option value="inch">inch</option>
              <option value="cm">cm</option>
              <option value="mm">mm</option>
            </select>
          </div>
          <div class="dimensions-row">
            <div class="input-wrapper">
              <label for="max-width">Width</label>
              <input type="number" id="max-width" placeholder="Auto" class="neon-input">
            </div>

            <button id="lock-aspect-ratio" class="lock-btn" title="Lock Aspect Ratio">
              <svg id="lock-icon-unlocked" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
              </svg>
              <svg id="lock-icon-locked" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </button>

            <div class="input-wrapper">
              <label for="max-height">Height</label>
              <input type="number" id="max-height" placeholder="Auto" class="neon-input">
            </div>
          </div>
        </div>

        <div class="control-group">
          <label for="format-select">Output Format</label>
          <select id="format-select" class="neon-select">
            <option value="image/jpeg" selected>JPEG</option>
            <option value="image/webp">WebP</option>
            <option value="image/png">PNG (Lossless)</option>
            <option value="application/pdf">PDF Document</option>
          </select>
        </div>

        <div class="batch-actions" style="margin-top: 40px;">
          <button class="btn btn-secondary" id="reset-btn" style="flex: 1;">Clear All</button>
          <button class="btn btn-primary glow-btn" id="process-btn" style="flex: 2;">
            Compress All
          </button>
        </div>
      </div>

      <div class="preview-panel glass-card">
        <h3>Queue (<span id="queue-count">0</span>)</h3>

        <div class="batch-queue">
          <div class="queue-table-container">
            <table class="queue-table">
              <thead>
                <tr>
                  <th>File</th>
                  <th>Original</th>
                  <th>Compressed</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="queue-body">
                <!-- Rows added dynamically -->
              </tbody>
            </table>
            <div id="empty-state" class="empty-state">
              No files in queue
            </div>
          </div>
        </div>

        <div class="action-footer" id="batch-footer">
          <button class="btn btn-primary glow-btn hidden" id="download-all-btn">
            Download All (ZIP)
          </button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./src/batch.js"></script>
</body>

</html>
